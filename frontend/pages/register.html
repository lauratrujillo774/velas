<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro | Guilar TODO List App</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../assets/css/style.css">
    <link rel="stylesheet" href="../assets/css/login.css">
</head>

<body data-page="register">
    <main class="auth-simple">
        <section class="auth-form-card fade-in" aria-labelledby="registerTitle">
            <div class="brand-mark mx-auto mb-3"><i class="bi bi-check2-square"></i></div>
            <h1 id="registerTitle">Crear cuenta</h1>
            <p class="text-muted text-center mb-4">Completa tus datos para empezar a organizar tus tareas.</p>

            <form id="registerForm" class="row g-3" novalidate>
                <div class="col-md-6">
                    <label class="form-label" for="firstName">Nombre</label>
                    <input class="form-control" id="firstName" name="firstName" required>
                    <div class="invalid-feedback">Campo obligatorio.</div>
                </div>
                <div class="col-md-6">
                    <label class="form-label" for="lastName">Apellido</label>
                    <input class="form-control" id="lastName" name="lastName" required>
                    <div class="invalid-feedback">Campo obligatorio.</div>
                </div>
                <div class="col-md-6">
                    <label class="form-label" for="username">Usuario</label>
                    <input class="form-control" id="username" name="username" required>
                    <div class="invalid-feedback">Campo obligatorio.</div>
                </div>
                <div class="col-md-6">
                    <label class="form-label" for="phone">Teléfono</label>
                    <input class="form-control" id="phone" name="phone" type="tel" required>
                    <div class="invalid-feedback">Campo obligatorio.</div>
                </div>
                <div class="col-12">
                    <label class="form-label" for="registerEmail">Correo</label>
                    <input class="form-control" id="registerEmail" name="email" type="email" required>
                    <div class="invalid-feedback">Ingresa un correo válido.</div>
                </div>
                <div class="col-md-6">
                    <label class="form-label" for="registerPassword">Contraseña</label>
                    <input class="form-control" id="registerPassword" name="password" type="password" minlength="6" required>
                    <div class="invalid-feedback">Mínimo 6 caracteres.</div>
                </div>
                <div class="col-md-6">
                    <label class="form-label" for="confirmPassword">Confirmar contraseña</label>
                    <input class="form-control" id="confirmPassword" name="confirmPassword" type="password" minlength="6" required>
                    <div class="invalid-feedback">Confirma tu contraseña.</div>
                </div>
                <div class="col-12">
                    <label class="form-label" for="photoInput">Fotografía</label>
                    <div class="upload-preview">
                        <img id="photoPreview" src="../assets/img/auth-illustration.svg" alt="Vista previa de fotografia">
                        <input class="form-control" id="photoInput" name="photoInput" type="file" accept="image/*">
                    </div>
                </div>
                <div class="col-12">
                    <div class="form-check">
                        <input class="form-check-input" id="terms" type="checkbox" required>
                        <label class="form-check-label" for="terms">Acepto los términos y condiciones</label>
                        <div class="invalid-feedback">Debes aceptar los términos.</div>
                    </div>
                </div>
                <div class="col-12 d-grid gap-2">
                    <button class="btn btn-primary-app" type="submit">Registrarse</button>
                    <a class="btn btn-light-app" href="login.html">Volver al Login</a>
                </div>
            </form>
        </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="../assets/js/login.js"></script>
</body>

</html>
