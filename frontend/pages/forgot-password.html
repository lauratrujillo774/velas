<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar contraseña | Guilar</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../assets/css/style.css">
    <link rel="stylesheet" href="../assets/css/login.css">
</head>

<body data-page="forgot">
    <main class="auth-simple">
        <section class="auth-form-card compact fade-in" aria-labelledby="forgotTitle">
            <div class="brand-mark mx-auto mb-3"><i class="bi bi-shield-lock"></i></div>
            <h1 id="forgotTitle">Recuperar contraseña</h1>
            <p class="text-muted text-center mb-4">Simula el envío de un código y crea una nueva contraseña.</p>

            <form id="forgotForm" class="vstack gap-3" novalidate>
                <div>
                    <label class="form-label" for="forgotEmail">Correo</label>
                    <input class="form-control" id="forgotEmail" type="email" required>
                    <div class="invalid-feedback">Ingresa un correo válido.</div>
                </div>
                <div>
                    <label class="form-label" for="code">Código de verificación</label>
                    <input class="form-control" id="code" inputmode="numeric" maxlength="6" required>
                    <div class="invalid-feedback">Ingresa el código.</div>
                </div>
                <div>
                    <label class="form-label" for="newPassword">Nueva contraseña</label>
                    <input class="form-control" id="newPassword" type="password" minlength="6" required>
                    <div class="invalid-feedback">Mínimo 6 caracteres.</div>
                </div>
                <div>
                    <label class="form-label" for="newPasswordConfirm">Confirmar contraseña</label>
                    <input class="form-control" id="newPasswordConfirm" type="password" minlength="6" required>
                    <div class="invalid-feedback">Confirma tu contraseña.</div>
                </div>
                <button class="btn btn-primary-app" type="submit">Actualizar contraseña</button>
                <a class="btn btn-light-app" href="login.html">Volver al Login</a>
            </form>
        </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="../assets/js/login.js"></script>
</body>

</html>
